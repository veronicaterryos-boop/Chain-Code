<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaloPesa Mkataba Generator</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #ff6600; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="date"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .signature-container { border: 1px solid #000; width: 100%; height: 150px; margin-bottom: 10px; background: #fafafa; }
        canvas { width: 100%; height: 100%; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-submit { background: #28a745; }
        .btn-clear { background: #dc3545; }
        .btn-sig-clear { background: #6c757d; font-size: 12px; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fomu ya Usajili - Pay by HaloPesa</h2>
    <form id="mkatabaForm">
        
        <div class="form-group">
            <label>Merchant Aggregator Name</label>
            <input type="text" id="aggregatorName" required>
        </div>
        <div class="form-group">
            <label>Till Number</label>
            <input type="text" id="tillNumber" required>
        </div>
        <div class="form-group">
            <label>Date</label>
            <input type="text" id="dateInput" placeholder="DD/MM/YYYY" required>
        </div>

        <div class="form-group">
            <label>Business Registration Name</label>
            <input type="text" id="businessName" required>
        </div>
        <div class="form-group">
            <label>Business Type (Restaurant, Salon, etc.)</label>
            <input type="text" id="businessType" required>
        </div>
        <div class="form-group">
            <label>TIN Number</label>
            <input type="text" id="tinNumber" required>
        </div>
        <div class="form-group">
            <label>Owner's Name</label>
            <input type="text" id="ownerName" required>
        </div>
        <div class="form-group">
            <label>Owner's Phone Number (+255...)</label>
            <input type="text" id="ownerPhone" required>
        </div>
        <div class="form-group">
            <label>Other Phone Number</label>
            <input type="text" id="otherPhone">
        </div>
        
        <div class="form-group">
            <label>Ward</label>
            <input type="text" id="ward" required>
        </div>
        <div class="form-group">
            <label>District</label>
            <input type="text" id="district" required>
        </div>
        <div class="form-group">
            <label>Province/Region</label>
            <input type="text" id="region" required>
        </div>

        <div class="form-group">
            <label>HaloPesa Account Name</label>
            <input type="text" id="halopesaAccount" required>
        </div>
        <div class="form-group">
            <label>Phone Number (+255...)</label>
            <input type="text" id="halopesaPhone" required>
        </div>

        <div class="form-group">
            <label>Sahihi (Signature)</label>
            <div class="signature-container">
                <canvas id="signaturePad"></canvas>
            </div>
            <button type="button" class="btn-sig-clear" id="clearSignature">Futa Sahihi</button>
        </div>

        <div class="buttons">
            <button type="button" class="btn-submit" id="generatePdf">Tengeneza PDF (Mkataba)</button>
            <button type="button" class="btn-clear" id="resetForm">Ghairi</button>
        </div>
    </form>
</div>

<script>
    // Initialize Signature Pad
    const canvas = document.getElementById('signaturePad');
    const signaturePad = new SignaturePad(canvas, { penColor: "blue" });

    // Fix canvas rendering size
    function resizeCanvas() {
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.onresize = resizeCanvas;
    resizeCanvas();

    // Clear buttons
    document.getElementById('clearSignature').addEventListener('click', () => signaturePad.clear());
    document.getElementById('resetForm').addEventListener('click', () => {
        document.getElementById('mkatabaForm').reset();
        signaturePad.clear();
    });

    // Generate PDF
    document.getElementById('generatePdf').addEventListener('click', async () => {
        try {
            // 1. Fetch your blank Form No. 1 PDF. 
            // YOU MUST CHANGE THIS URL to where your blank PDF is hosted.
            const url = 'Form_NO-1.pdf'; 
            const existingPdfBytes = await fetch(url).then(res => res.arrayBuffer());

            // 2. Fetch a handwriting font (Caveat) from Google Fonts
            const fontUrl = 'https://fonts.gstatic.com/s/caveat/v18/Wnz6HAc5bAfYB2Q7Yj82ciM_lA.woff2';
            const fontBytes = await fetch(fontUrl).then(res => res.arrayBuffer());

            const { PDFDocument, rgb } = PDFLib;
            const pdfDoc = await PDFDocument.load(existingPdfBytes);
            
            // Register fontkit to allow custom fonts
            pdfDoc.registerFontkit(window.fontkit);
            const customFont = await pdfDoc.embedFont(fontBytes);

            const pages = pdfDoc.getPages();
            const firstPage = pages[0];
            const bluePen = rgb(0, 0, 0.8);
            const textSize = 14;

            // Helper function to draw text
            const drawText = (text, x, y) => {
                if(text) {
                    firstPage.drawText(text, { x, y, size: textSize, font: customFont, color: bluePen });
                }
            };

            // 3. Map inputs to PDF coordinates.
            // But here's the problem: You will need to adjust these X and Y numbers to match your exact PDF layout perfectly.
            drawText(document.getElementById('aggregatorName').value, 150, 720); // Name [cite: 59]
            drawText(document.getElementById('tillNumber').value, 150, 700); // Till Number [cite: 60]
            drawText(document.getElementById('dateInput').value, 150, 680); // Date [cite: 61]
            
            drawText(document.getElementById('businessName').value, 200, 620); // Business Name [cite: 63]
            drawText(document.getElementById('businessType').value, 200, 600); // Business Type [cite: 64]
            drawText(document.getElementById('tinNumber').value, 400, 600); // TIN
            drawText(document.getElementById('ownerName').value, 200, 580); // Owner Name [cite: 65]
            drawText(document.getElementById('ownerPhone').value, 200, 560); // Phone [cite: 66]
            drawText(document.getElementById('otherPhone').value, 400, 560); // Other Phone [cite: 67]
            
            drawText(document.getElementById('ward').value, 150, 500); // Ward [cite: 68]
            drawText(document.getElementById('district').value, 300, 500); // District [cite: 74]
            drawText(document.getElementById('region').value, 450, 500); // Region [cite: 69]

            drawText(document.getElementById('halopesaAccount').value, 250, 420); // Account Name [cite: 77]
            drawText(document.getElementById('halopesaPhone').value, 250, 400); // Phone [cite: 78]

            drawText(document.getElementById('ownerName').value, 150, 150); // Signature Name [cite: 93]
            drawText(document.getElementById('dateInput').value, 150, 110); // Signature Date [cite: 95]

            // 4. Embed Signature
            if (!signaturePad.isEmpty()) {
                const sigDataUri = signaturePad.toDataURL('image/png');
                const sigBytes = await fetch(sigDataUri).then(res => res.arrayBuffer());
                const sigImage = await pdfDoc.embedPng(sigBytes);
                
                // Adjust X, Y, width, and height for the signature [cite: 94]
                firstPage.drawImage(sigImage, {
                    x: 150,
                    y: 120,
                    width: 100,
                    height: 30,
                });
            }

            // 5. Save and Download
            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Mkataba_Uliojazwa.pdf";
            link.click();

        } catch (error) {
            console.error("Error generating PDF: ", error);
            alert("Kuna shida kutengeneza PDF. Check console.");
        }
    });
</script>

</body>
</html>
